name: APIs.io JSON-LD
description: Browse JSON-LD semantic vocabularies across the APIs.io network.
image: https://apis.io/assets/branding/apisio-social-card.png
url: https://json-ld.apis.io

node: website
nav_active: more

keywords:
  - APIs
  - Search
  - Discovery

exclude: [".rvmrc", ".rbenv-version", "README.md", "Rakefile", "changelog.md", "scripts"]
include: [".well-known"]

github_org: api-search
github_repo: json-ld

collections:
  jsonld:
    output: true
    permalink: /jsonld/:path/

defaults:
  - scope:
      path: ""
      type: jsonld
    values:
      layout: jsonld
